name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from tag annotation
        id: notes
        shell: bash
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${{ steps.version.outputs.tag }}")
          if [[ -z "$NOTES" ]]; then
            echo "ERROR: Tag '${{ steps.version.outputs.tag }}' has no annotation message." >&2
            echo "Use 'git tag -a vX.Y.Z -m \"Release notes here\"' to create an annotated tag." >&2
            exit 1
          fi
          echo "$NOTES" > release-notes.txt

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CONFIG='{"version":"${{ steps.version.outputs.version }}","bundle":{"createUpdaterArtifacts":true}}'
          node node_modules/@tauri-apps/cli/tauri.js build --config "$CONFIG"

      - name: Locate build artifacts
        id: artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          EXE=$(ls "$BUNDLE_DIR"/*-setup.exe | head -1)
          SIG="${EXE}.sig"
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "exename=$(basename "$EXE")" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json manifest
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          EXENAME="${{ steps.artifacts.outputs.exename }}"
          SIGNATURE=$(cat "${{ steps.artifacts.outputs.sig }}")
          jq -n \
            --arg version "$VERSION" \
            --arg sig "$SIGNATURE" \
            --arg url "https://github.com/ChLah/yank/releases/download/${TAG}/${EXENAME}" \
            '{
              version: $version,
              notes: "See release notes on GitHub.",
              pub_date: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
              platforms: {"windows-x86_64": {signature: $sig, url: $url}}
            }' > latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: |
            ${{ steps.artifacts.outputs.exe }}
            ${{ steps.artifacts.outputs.sig }}
            latest.json
